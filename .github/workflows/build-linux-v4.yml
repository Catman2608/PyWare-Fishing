name: Build Linux Application

on:
    workflow_dispatch:

jobs:
    build-linux:
        runs-on: ubuntu-latest
        env:
            FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        steps:
            - name: Checkout repo
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.12"

            - name: Install system dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y \
                    libxkbcommon-x11-0 \
                    libxcb-icccm4 \
                    libxcb-image0 \
                    libxcb-keysyms1 \
                    libxcb-randr0 \
                    libxcb-render-util0 \
                    libxcb-shape0 \
                    libxcb-xfixes0 \
                    libxcb-xinerama0 \
                    libxcb-xkb1 \
                    libxkbcommon-x11-0 \
                    libgl1-mesa-glx \
                    libegl1-mesa \
                    libopengl0 \
                    tesseract-ocr \
                    libtesseract-dev \
                    libleptonica-dev

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install pywebview customtkinter numpy mss pytesseract pynput requests opencv-python pyinstaller
                  pip install python-xlib

            - name: Build Linux executable with PyInstaller
              run: |
                  pyinstaller --onefile --windowed PyWareFishingV4.py --name PyWareFishingV4 --icon="icon.ico"

            - name: List dist contents
              run: |
                  ls -la dist/
                  ls -la dist/PyWareFishingV4

            - name: Upload Linux executable artifact
              uses: actions/upload-artifact@v4
              with:
                  name: Linux-Executable
                  path: dist/PyWareFishingV4
                  if-no-files-found: error