name: Build Silicon DMG

on:
    workflow_dispatch:

jobs:
    build-mac:
        runs-on: macos-latest
        env:
            FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

        steps:
            - name: Checkout repo
              uses: actions/checkout@main

            - name: Set up Python
              uses: actions/setup-python@main
              with:
                  python-version: "3.12"

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install pyinstaller opencv-python numpy customtkinter pynput mss requests PyObjC

            - name: Build with PyInstaller
              run: |
                  pyinstaller --onedir --windowed PyWareFishingV4.py --name PyWareFishingV4 --icon="icon.icns" --add-data "ui;ui"

            - name: Check dist contents
              run: |
                  ls -lh dist
                  echo "Contents of dist:"
                  ls -la dist/

            - name: Create DMG from .app bundle
              run: |
                  APP_PATH=$(find dist -name "*.app" -type d | head -n 1)
                  echo "Found app at: $APP_PATH"
                  
                  hdiutil create \
                    -volname "PyWareFishingV4" \
                    -srcfolder "$APP_PATH" \
                    -ov \
                    -format UDZO \
                    PyWareFishingV4.dmg
                  
                  echo "DMG created:"
                  ls -lh PyWareFishingV4.dmg

            - name: Upload DMG artifact
              uses: actions/upload-artifact@v4
              with:
                  name: PyWareFishingV4-macOS
                  path: PyWareFishingV4.dmg