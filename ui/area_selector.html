<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
    * {margin: 0; padding: 0; box-sizing: border-box;}
    html, body {
            width: 100%;
            height: 100%;
            position: fixed;
            inset: 0;
            overflow: hidden;
            user-select: none;
            background: transparent;
    }
    canvas {
        display: block;
        width: 100%; height: 100%;
        cursor: default;
    }

</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
//  Constants ─
const HANDLE_R = 7;   // handle square half-size (px)
const BORDER   = 3;   // box border width

const AREAS = {
    shake:  { color: "#ff007a", label: "Shake Box" },
    fish:   { color: "#00daff", label: "Fish Box"  },
    friend: { color: "#f7ff00", label: "Friend Box" },
    totem:  { color: "#9cff94", label: "Totem Box" },
};
const AREA_ORDER = ["shake", "fish", "friend", "totem"];

//  State ──
let boxes = {};           // { shake: {x,y,w,h}, ... }  — logical px
let drag  = null;         // { name, handle, startX, startY, origBox }

//  Canvas setup ─
const canvas = document.getElementById("c");
const ctx    = canvas.getContext("2d");

function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    draw();
}
window.addEventListener("resize", resize);
resize();
//  Init: wait for pywebview then load areas from Python ──
window.addEventListener("pywebviewready", () => {
    pywebview.api.get_areas().then(data => {
        boxes = data;   // {shake:{x,y,width,height}, ...}
        // Normalise key names: Python sends width/height, we store as w/h
        for (const k of AREA_ORDER) {
            const b = boxes[k];
            if (b && b.width !== undefined) {
                b.w = b.width; b.h = b.height;
                delete b.width; delete b.height;
            }
        }
        resize();
    });
});

//  Drawing 
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Use canvas to draw semi-transparent overlay for consistent cross-platform rendering
    // This avoids CSS opacity issues on Windows where rgba() may appear opaque
    ctx.fillStyle = "rgba(0, 0, 0, 0.15)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    for (const name of AREA_ORDER) {
        const b = boxes[name];
        if (!b) continue;
        drawBox(b, AREAS[name].color, AREAS[name].label);
    }
}

function drawBox(b, color, label) {
    const { x, y, w, h } = b;

    // Filled rectangle (semi-transparent)
    ctx.save();
    ctx.globalAlpha = 0.25;
    ctx.fillStyle = color;
    ctx.fillRect(x, y, w, h);
    ctx.restore();

    // Border
    ctx.strokeStyle = color;
    ctx.lineWidth   = BORDER;
    ctx.strokeRect(x + BORDER/2, y + BORDER/2, w - BORDER, h - BORDER);

    // Label above box
    ctx.font      = "bold 13px 'Segoe UI', Arial, sans-serif";
    ctx.fillStyle = color;
    ctx.textAlign = "center";
    ctx.textBaseline = "bottom";
    ctx.fillText(label, x + w / 2, y - 6);

    // 8 handles
    for (const [hx, hy] of handlePoints(b)) {
        ctx.fillStyle   = "white";
        ctx.strokeStyle = "rgba(0,0,0,0.5)";
        ctx.lineWidth   = 1;
        ctx.fillRect(hx - HANDLE_R, hy - HANDLE_R, HANDLE_R*2, HANDLE_R*2);
        ctx.strokeRect(hx - HANDLE_R, hy - HANDLE_R, HANDLE_R*2, HANDLE_R*2);
    }
}

function handlePoints(b) {
    const { x, y, w, h } = b;
    const mx = x + w/2, my = y + h/2;
    return [
        [x,    y   ], [x+w, y   ], [x,   y+h], [x+w, y+h],
        [mx,   y   ], [mx,  y+h ], [x,   my ], [x+w, my  ],
    ];
}

//  Hit testing ──
// Returns handle name ("nw","ne","sw","se","n","s","w","e") or null
function hitHandle(px, py, b) {
    const { x, y, w, h } = b;
    const mx = x + w/2, my = y + h/2;
    const pts = {
        nw:[x,y], ne:[x+w,y], sw:[x,y+h], se:[x+w,y+h],
        n:[mx,y], s:[mx,y+h], w:[x,my],   e:[x+w,my],
    };
    for (const [name, [hx, hy]] of Object.entries(pts)) {
        if (Math.abs(px - hx) <= HANDLE_R + 3 && Math.abs(py - hy) <= HANDLE_R + 3)
            return name;
    }
    return null;
}

function hitBox(px, py, b) {
    return px >= b.x && px <= b.x+b.w && py >= b.y && py <= b.y+b.h;
}

function cursorForHandle(h) {
    return {
        nw:"nw-resize", se:"se-resize",
        ne:"ne-resize", sw:"sw-resize",
        n:"n-resize",   s:"s-resize",
        w:"w-resize",   e:"e-resize",
    }[h] || "default";
}

//  Mouse events ──
canvas.addEventListener("mousemove", e => {
    if (drag) {
        const dx = e.clientX - drag.startX;
        const dy = e.clientY - drag.startY;
        const ob = drag.origBox;
        const b  = boxes[drag.name];

        if (drag.handle === "move") {
            b.x = ob.x + dx;
            b.y = ob.y + dy;
        } else {
            // Resize
            const h = drag.handle;
            if (h.includes("e")) { b.w = Math.max(20, ob.w + dx); }
            if (h.includes("s")) { b.h = Math.max(20, ob.h + dy); }
            if (h.includes("w")) { b.x = ob.x + dx; b.w = Math.max(20, ob.w - dx); }
            if (h.includes("n")) { b.y = ob.y + dy; b.h = Math.max(20, ob.h - dy); }
        }
        draw();

        // Send live ratio to Python (for status bar)
        pywebview.api.on_mouse_move(e.clientX, e.clientY,
            JSON.parse(JSON.stringify(boxes)));
        }

    let hovering = false;

    for (const name of AREA_ORDER) {
        const b = boxes[name];
        if (!b) continue;

        const h = hitHandle(e.clientX, e.clientY, b);

        if (h) {
            canvas.style.cursor = cursorForHandle(h);
            hovering = true;
            break;
        }

        if (hitBox(e.clientX, e.clientY, b)) {
            canvas.style.cursor = "move";
            hovering = true;
            break;
        }
    }

    if (!hovering) {
        canvas.style.cursor = "default";
    }

    pywebview.api.on_mouse_move(
        e.clientX,
        e.clientY,
        JSON.parse(JSON.stringify(boxes))
    );
});

canvas.addEventListener("mousedown", e => {
    if (e.button !== 0) return;
    for (const name of AREA_ORDER) {
        const b = boxes[name];
        if (!b) continue;
        const h = hitHandle(e.clientX, e.clientY, b);
        if (h) {
            drag = { name, handle: h, startX: e.clientX, startY: e.clientY,
                             origBox: { ...b } };
            return;
        }
        if (hitBox(e.clientX, e.clientY, b)) {
            drag = { name, handle: "move", startX: e.clientX, startY: e.clientY,
                             origBox: { ...b } };
            return;
        }
    }
});

canvas.addEventListener("mouseup", () => { drag = null; });
canvas.addEventListener("mouseleave", () => { drag = null; });

//  Keyboard: Escape or F6 closes and saves 
document.addEventListener("keydown", e => {
    if (e.key === "Escape" || e.key === "F6") {
        saveAndClose();
    }
});

function saveAndClose() {
    // Convert back to {x, y, width, height} format for Python
    const out = {};
    for (const name of AREA_ORDER) {
        const b = boxes[name];
        out[name] = { x: b.x, y: b.y, width: b.w, height: b.h };
    }
    pywebview.api.save_areas(out);
}
</script>
</body>
</html>
